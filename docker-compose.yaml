services:
  docker-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-proxy:latest
    container_name: docker-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/etc/docker-proxy/config.yaml:ro
      # 命名卷落在 Docker/本机文件系统，首拉写缓存时比绑定宿主机目录（尤其 WSL2）快得多
      - docker-proxy-cache:/cache

volumes:
  docker-proxy-cache:
