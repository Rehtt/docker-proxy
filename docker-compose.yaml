services:
  docker-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-proxy:latest
    container_name: docker-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/etc/docker-proxy/config.yaml:ro
      - ./cache:/cache # 需配合 config 中 cache.dir: /cache
